<body>
<div id="jukebox">
    <!-- Bubble Tubes -->
    <div class="bubble-tube bubble-tube--left" id="bubble-left" aria-hidden="true"></div>
    <div class="bubble-tube bubble-tube--right" id="bubble-right" aria-hidden="true"></div>

    <!-- Arch Section (Top) -->
    <div id="arch">
        <div id="arch-title">Dosswerks Arcade Jukebox</div>
        <div id="vinyl-container">
            <div id="vinyl" aria-hidden="true">
                <div id="vinyl-label"></div>
            </div>
        </div>
        <div id="now-playing" aria-live="polite">Select a track...</div>
    </div>

    <!-- Song List -->
    <div id="song-list"></div>

    <!-- Controls Bar -->
    <div id="controls">
        <!-- Progress -->
        <div id="progress-container">
            <span class="time-display" id="elapsed-time">0:00</span>
            <div id="progress-bar" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                <div id="progress-bar-inner">
                    <div id="progress-fill"></div>
                </div>
            </div>
            <span class="time-display" id="total-time">0:00</span>
        </div>

        <!-- Transport -->
        <div id="transport">
            <button class="transport-btn" id="btn-prev" aria-label="Previous track">⏮</button>
            <button class="transport-btn transport-btn--play" id="btn-play" aria-label="Play">▶</button>
            <button class="transport-btn" id="btn-next" aria-label="Next track">⏭</button>
        </div>

        <!-- Mode Controls -->
        <div id="mode-controls">
            <button class="mode-btn" id="btn-loop" aria-label="Playback mode: play-through">▶️</button>
            <button class="mode-btn" id="btn-shuffle" aria-label="Shuffle: off">🔀</button>
        </div>

        <!-- Volume -->
        <div id="volume-container">
            <button class="mute-btn" id="btn-mute" aria-label="Mute">🔊</button>
            <input type="range" id="volume-slider" min="0" max="100" value="100"
                   aria-label="Volume" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100">
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" aria-hidden="true">
        <span class="loading-text">Loading Library...</span>
    </div>

    <!-- Toast Notification -->
    <div id="toast" role="alert" aria-live="assertive" aria-hidden="true"></div>

    <!-- Screen Reader Announcements -->
    <div id="sr-announcements" class="sr-only" aria-live="polite"></div>
</div>
<script src="tracks.js"></script>
