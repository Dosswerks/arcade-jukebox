      this._el.loopBtn.classList.toggle('active', mode === 'loop-one' || mode === 'loop-all');

      // Update the loop icon SVG to indicate mode
      const svg = this._el.loopBtn.querySelector('.icon-loop');
      if (svg && mode === 'loop-one') {
        // Add a "1" indicator for loop-one
        let oneText = svg.querySelector('.loop-one-indicator');
        if (!oneText) {
          oneText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          oneText.classList.add('loop-one-indicator');
          oneText.setAttribute('x', '12');
          oneText.setAttribute('y', '15');
          oneText.setAttribute('text-anchor', 'middle');
          oneText.setAttribute('font-size', '8');
          oneText.setAttribute('font-weight', 'bold');
          oneText.setAttribute('fill', 'currentColor');
          oneText.setAttribute('stroke', 'none');
          oneText.textContent = '1';
          svg.appendChild(oneText);
        }
        oneText.style.display = '';
      } else if (svg) {
        const oneText = svg.querySelector('.loop-one-indicator');
        if (oneText) oneText.style.display = 'none';
      }
    }
  }

  /**
   * Update shuffle button state.
   * @param {boolean} enabled
   */
  setShuffleButtonState(enabled) {
    if (this._el.shuffleBtn) {
      this._el.shuffleBtn.classList.toggle('active', enabled);
      this._el.shuffleBtn.setAttribute(
        'aria-label',
        enabled ? 'Shuffle: on' : 'Shuffle: off'
      );
    }
  }

  /**
   * Remove all event listeners, nullify DOM references.
   */
  destroy() {
    if (this._toastTimeout) {
      clearTimeout(this._toastTimeout);
    }
    this._el = {};
  }
}

    // === ANIMATION CONTROLLER ===
/**
 * Animation Controller
 * Manages CSS animation states (vinyl spin, bubble tubes).
 * Respects prefers-reduced-motion and Page Visibility API.
 */

class AnimationController {
  constructor() {
    this._vinylElement = null;
    this._bubbleElements = [];
    this._reducedMotion = false;
    this._paused = false;
    this._vinylSpinning = false;

    // Detect reduced motion preference
    this._motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
    this._reducedMotion = this._motionQuery.matches;

    // Listen for runtime changes
    this._motionHandler = (e) => {
      this._reducedMotion = e.matches;
      this._applyState();
    };
    this._motionQuery.addEventListener('change', this._motionHandler);
  }

  /**
   * Set DOM element references for animations.
   * @param {HTMLElement} vinyl - The vinyl record element
   * @param {HTMLElement[]} bubbles - Bubble tube container elements
   */
  setElements(vinyl, bubbles) {
    this._vinylElement = vinyl;
    this._bubbleElements = bubbles || [];
    this._applyState();
  }

  /**
   * Pause all animations (tab hidden).
   */
  pause() {
    this._paused = true;
    this._applyState();
  }

  /**
   * Resume animations (tab visible and motion allowed).
   */
  resume() {
    this._paused = false;
    this._applyState();
  }

  /**
   * Set vinyl spin state based on playback.
   * @param {boolean} spinning
   */
  setVinylSpinning(spinning) {
    this._vinylSpinning = spinning;
    this._applyState();
  }

  /**
   * Check if reduced motion is preferred.
   * @returns {boolean}
   */
  isReducedMotion() {
    return this._reducedMotion;
  }

  /**
   * Remove event listeners, clear references.
   */
  destroy() {
    this._motionQuery.removeEventListener('change', this._motionHandler);
    this._vinylElement = null;
    this._bubbleElements = [];
  }

  /**
   * Apply the current animation state to DOM elements.
   * @private
   */
  _applyState() {
    const shouldAnimate = !this._reducedMotion && !this._paused;

    // Vinyl spin
    if (this._vinylElement) {
      if (shouldAnimate && this._vinylSpinning) {
        this._vinylElement.style.animationPlayState = 'running';
      } else {
        this._vinylElement.style.animationPlayState = 'paused';
      }
    }

    // Bubble tubes
    this._bubbleElements.forEach((el) => {
      if (shouldAnimate) {
        el.style.animationPlayState = 'running';
      } else {
        el.style.animationPlayState = 'paused';
      }
    });
  }
}

    // === VISIBILITY CONTROLLER ===
/**
 * Visibility Controller
 * Observes Page Visibility API and dispatches pause/resume signals.
 *
 * Design note: When tab is backgrounded, audio CONTINUES but animations PAUSE.
 * This asymmetry is intentional — audio is the primary function, animations are
 * decorative and consume GPU/battery.
 */

class VisibilityController {
  /**
   * @param {object} callbacks
   * @param {function} callbacks.onHidden - Called when tab becomes hidden
   * @param {function} callbacks.onVisible - Called when tab becomes visible
   */
  constructor(callbacks) {
    this._callbacks = callbacks;
    this._handler = () => {
      if (document.visibilityState === 'hidden') {
        this._callbacks.onHidden();
      } else {
        this._callbacks.onVisible();
      }
    };
    document.addEventListener('visibilitychange', this._handler);
  }

  /**
   * Remove visibilitychange event listener.
   */
  destroy() {
    document.removeEventListener('visibilitychange', this._handler);
  }
}

    // === KEYBOARD NAVIGATION ===
/**
 * Keyboard Navigation
 * Implements full keyboard support for the jukebox interface.
 *
 * Focus order: Play/Pause → Skip Back → Skip Forward → Volume → Mute → Loop → Shuffle → Song List
 * Song list: Arrow Up/Down moves focus, Enter/Space plays, Home/End jumps
 * Escape: return focus to play button
 */

function setupKeyboardNavigation(ui, playerEngine, songListRenderer, tracks) {
  const songList = ui.songListContainer;
  let focusedSongIndex = 0;

  // Song list keyboard handler
  songList.addEventListener('keydown', (e) => {
    const items = songList.querySelectorAll('[role="option"]');
    if (items.length === 0) return;

    switch (e.key) {
      case 'ArrowDown':
        e.preventDefault();
        focusedSongIndex = Math.min(focusedSongIndex + 1, items.length - 1);
        songListRenderer.setSelectedTrack(focusedSongIndex);
        playerEngine.setSelectedIndex(focusedSongIndex);
        break;

      case 'ArrowUp':
        e.preventDefault();
        focusedSongIndex = Math.max(focusedSongIndex - 1, 0);
        songListRenderer.setSelectedTrack(focusedSongIndex);
        playerEngine.setSelectedIndex(focusedSongIndex);
        break;

      case 'Home':
        e.preventDefault();
        focusedSongIndex = 0;
        songListRenderer.setSelectedTrack(focusedSongIndex);
        playerEngine.setSelectedIndex(focusedSongIndex);
        break;

      case 'End':
        e.preventDefault();
        focusedSongIndex = items.length - 1;
        songListRenderer.setSelectedTrack(focusedSongIndex);
        playerEngine.setSelectedIndex(focusedSongIndex);
        break;

      case 'Enter':
      case ' ':
        e.preventDefault();
        playerEngine.play(focusedSongIndex);
        break;
    }
  });

  // Volume slider keyboard (5% increments handled natively by range input)
  // Just ensure aria-valuenow stays in sync
  if (ui.volumeSlider) {
    ui.volumeSlider.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        // Let native range handle it, then sync
        setTimeout(() => {
          playerEngine.setVolume(parseInt(ui.volumeSlider.value) / 100);
        }, 0);
      }
    });
  }

  // Global Escape handler
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      e.preventDefault();
      if (ui.playPauseBtn) {
        ui.playPauseBtn.focus();
      }
    }
  });
}

    // === TOUCH HANDLER ===
/**
 * Touch Handler
 * Implements touch interaction refinements for mobile UX.
 *
 * - Drag threshold: 10px before recognizing as scroll
 * - Tap detection: fire only if movement < 10px from touchstart
 * - Progress bar scrub uses requestAnimationFrame during active scrub
 * - Passive listeners except on progress bar
 */

// Touch handling is integrated into the app-initializer's event setup.
// This module provides utility functions for touch gesture detection.

const DRAG_THRESHOLD = 10;

/**
 * Creates a tap detector that distinguishes taps from scrolls.
 * @param {HTMLElement} element
 * @param {function} onTap - Called with the event when a tap is detected
 */
function setupTapDetection(element, onTap) {
  let startX = 0;
  let startY = 0;
  let moved = false;

  element.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false;
  }, { passive: true });

  element.addEventListener('touchmove', (e) => {
    const dx = Math.abs(e.touches[0].clientX - startX);
    const dy = Math.abs(e.touches[0].clientY - startY);
    if (dx > DRAG_THRESHOLD || dy > DRAG_THRESHOLD) {
      moved = true;
    }
  }, { passive: true });

  element.addEventListener('touchend', (e) => {
    if (!moved) {
      onTap(e);
    }
  }, { passive: true });
}

    // === APP INITIALIZER ===
/**
 * App Initializer
 * Entry point. Orchestrates startup sequence.
 */

// When used in build (concatenated), these are all in the same IIFE scope.
// During development with ES modules, they would be imported.

async function initApp() {
  const ui = getUIElements();

  // Show loading state
  if (ui.loadingOverlay) {
    ui.loadingOverlay.classList.add('visible');
    ui.loadingOverlay.setAttribute('aria-hidden', 'false');
  }

  // Fallback: if tracks.js failed to load (e.g., file:// CORS block),
  // default to empty array so the app shows "Empty Library" gracefully
  if (typeof window.PLAYLISTS === 'undefined' && typeof window.TRACKS === 'undefined') {
    window.PLAYLISTS = { default: { name: '', tracks: [] } };
  }

  // Parse URL query parameters
  const params = parseQueryParams();

  // Resolve playlist: ?playlist=<key> or fall back to "default"
  let playlistName = '';
  let trackFilenames = [];

  if (window.PLAYLISTS && typeof window.PLAYLISTS === 'object') {
    const playlistKey = params.playlist || 'default';
    const playlist = window.PLAYLISTS[playlistKey] || window.PLAYLISTS['default'];
    if (playlist) {
      playlistName = playlist.name || '';
      trackFilenames = Array.isArray(playlist.tracks) ? playlist.tracks : [];
    }
  } else if (Array.isArray(window.TRACKS)) {
    // Legacy support: plain TRACKS array
    trackFilenames = window.TRACKS;
  }

  // Set playlist header
  const playlistNameEl = document.getElementById('playlist-name');
  if (playlistNameEl && playlistName) {
    setTextSafe(playlistNameEl, playlistName);
  } else if (playlistNameEl) {
    // Hide header if no name
    const playlistHeader = document.getElementById('playlist-header');
    if (playlistHeader) playlistHeader.style.display = 'none';
  }

  // Check for tracks
  if (!Array.isArray(trackFilenames) || trackFilenames.length === 0) {
    hidLoading(ui);
    showEmptyLibrary(ui);
    return;
  }

  // Process manifest (ID3 + title derivation + sort)
  let tracks;
  try {
    tracks = await processManifest(trackFilenames);
  } catch (e) {
    showFatalError(ui, 'Failed to process music library');
    return;
  }

  // Apply game prefix filter
  if (params.game) {
    tracks = filterByGamePrefix(tracks, params.game);
  }

  // Store references
  const state = {
    masterPlaylist: tracks,
    filteredPlaylist: tracks,
  };

  // Create controllers
  const songListRenderer = new SongListRenderer(
    ui.songListContainer,
    ui.srAnnouncements,
    (index) => {
      const s = playerEngine.getState();
      if (s.status === 'idle' || s.status === 'error') {
        // Starting from stopped — swing arm first
        if (stylusArm && !stylusArm.classList.contains('playing')) {
          stylusArm.classList.add('playing');
          setTimeout(() => playerEngine.play(index), 800);
        } else {
          playerEngine.play(index);
        }
      } else {
        // Already playing/paused — just switch tracks, arm stays on
        playerEngine.play(index);
      }
    }
  );

  const playerEngine = new PlayerEngine(tracks, { gainNormalization: true });
  const animController = new AnimationController();
  const uiController = new UIController(ui);

  // Set up animation elements
  const bubbleElements = [];
  document.querySelectorAll('.bubble').forEach((el) => bubbleElements.push(el));
  animController.setElements(ui.vinylRecord, bubbleElements);

  // Stylus arm reference
  const stylusArm = document.getElementById('stylus-arm');

  // Set up VU Visualizer
  const vuCanvas = document.getElementById('vu-canvas');
  let vuAnimationId = null;
  let vuAnalyser = null;

  function initVUVisualizer() {
    const pipeline = playerEngine.getAudioPipeline();
    if (!pipeline || !pipeline.isWebAudioAvailable()) return;

    const ctx = pipeline.getContext();
    if (!ctx) return;

    vuAnalyser = ctx.createAnalyser();
    vuAnalyser.fftSize = 256;
    vuAnalyser.smoothingTimeConstant = 0.75;

    try {
      const gainNode = pipeline._gainNode;
      if (gainNode) {
        gainNode.connect(vuAnalyser);
      }
    } catch (e) {
      // Fallback: VU won't work but app continues
    }
  }

  function startVU() {
    if (!vuCanvas || !vuAnalyser) return;
    vuCanvas.classList.add('active');
    drawVU();
  }

  function stopVU() {
    if (vuCanvas) vuCanvas.classList.remove('active');
    if (vuAnimationId) {
      cancelAnimationFrame(vuAnimationId);
      vuAnimationId = null;
    }
  }

  function drawVU() {
    if (!vuAnalyser || !vuCanvas) return;
    const canvasCtx = vuCanvas.getContext('2d');
    if (!canvasCtx) return;

    const w = vuCanvas.clientWidth;
    const h = vuCanvas.clientHeight;

    if (vuCanvas.width !== w || vuCanvas.height !== h) {
      vuCanvas.width = w;
      vuCanvas.height = h;
    }

    // Use time-domain data for even distribution across bars
    const bufferLength = vuAnalyser.fftSize;
    const dataArray = new Uint8Array(bufferLength);
    vuAnalyser.getByteTimeDomainData(dataArray);

    canvasCtx.clearRect(0, 0, w, h);

    const barCount = 32;
    const barWidth = w / barCount;
    const maxBarHeight = h * 0.75;
    const samplesPerBar = Math.floor(bufferLength / barCount);

    // Initialize smoothed values on first call
    if (!drawVU._smoothed) {
      drawVU._smoothed = new Float32Array(barCount).fill(0.15);
    }
    const smoothed = drawVU._smoothed;
    const smoothing = 0.82; // Higher = smoother (0-1)

    // Color gradient: red → orange → green → cyan → purple
    function getBarColor(barIndex, intensity) {
      const ratio = barIndex / barCount;
      if (ratio < 0.2) {
        return { top: `rgba(255,50,50,${0.5 + intensity * 0.4})`, bottom: 'rgba(180,20,20,0.1)' };
      } else if (ratio < 0.4) {
        return { top: `rgba(255,140,0,${0.5 + intensity * 0.4})`, bottom: 'rgba(200,100,0,0.1)' };
      } else if (ratio < 0.6) {
        return { top: `rgba(57,255,20,${0.5 + intensity * 0.4})`, bottom: 'rgba(30,150,10,0.1)' };
      } else if (ratio < 0.8) {
        return { top: `rgba(0,191,255,${0.5 + intensity * 0.4})`, bottom: 'rgba(0,100,180,0.1)' };
      } else {
        return { top: `rgba(155,89,182,${0.5 + intensity * 0.4})`, bottom: 'rgba(100,40,130,0.1)' };
      }
    }

    for (let i = 0; i < barCount; i++) {
      // RMS amplitude for this bar's chunk
      const startSample = i * samplesPerBar;
      let sumSquares = 0;
      for (let s = startSample; s < startSample + samplesPerBar && s < bufferLength; s++) {
        const normalized = (dataArray[s] - 128) / 128;
        sumSquares += normalized * normalized;
      }
      const rms = Math.sqrt(sumSquares / samplesPerBar);
      const target = Math.min(1.0, rms * 3.5);

      // Smooth: rise fast, fall slow
      if (target > smoothed[i]) {
        smoothed[i] = smoothed[i] * 0.4 + target * 0.6;
      } else {
        smoothed[i] = smoothed[i] * smoothing + target * (1 - smoothing);
      }

      const intensity = smoothed[i];
      const value = intensity * 0.6 + 0.15;
      const barHeight = value * maxBarHeight;
      const x = i * barWidth;
      const y = h - barHeight;

      const colors = getBarColor(i, intensity);
      const gradient = canvasCtx.createLinearGradient(x, y, x, h);
      gradient.addColorStop(0, colors.top);
      gradient.addColorStop(1, colors.bottom);

      canvasCtx.fillStyle = gradient;
      canvasCtx.fillRect(x + 1, y, barWidth - 2, barHeight);

      if (intensity > 0.2) {
        canvasCtx.fillStyle = colors.top.replace(/[\d.]+\)$/, '0.9)');
        canvasCtx.fillRect(x + 1, y - 2, barWidth - 2, 2);
      }
    }

    vuAnimationId = requestAnimationFrame(drawVU);
  }

  // Visibility controller
  const visController = new VisibilityController({
    onHidden: () => {
      animController.pause();
    },
    onVisible: () => {
      animController.resume();
      // Resync progress bar
      const progress = playerEngine.getProgress();
      uiController.updateProgress(progress.elapsed, progress.duration);
    },
  });

  // Render song list
  songListRenderer.render(tracks);

  // Ensure list starts at the top
  ui.songListContainer.scrollTop = 0;

  // Generate bubble elements
  generateBubbles();

  // Restore persisted state
  const playerState = playerEngine.getState();
  uiController.setLoopButtonState(playerState.mode);
  uiController.setShuffleButtonState(playerState.shuffleEnabled);
  if (ui.volumeSlider) {
    ui.volumeSlider.value = String(playerState.volume * 100);
  }

  // If ?track= param, auto-select
  if (params.track) {
    const trackIdx = tracks.findIndex((t) => t.filename === params.track);
    if (trackIdx >= 0) {
      songListRenderer.setSelectedTrack(trackIdx);
      playerEngine.setSelectedIndex(trackIdx);
    }
  } else if (playerState.selectedTrackIndex >= 0) {
    songListRenderer.setSelectedTrack(playerState.selectedTrackIndex, { focus: false });
  }

  // Wire up Player Engine events
  let isPlayingFromStop = false; // Track if we're starting from a stopped state

  playerEngine.on('play', () => {
    animController.setVinylSpinning(true);
    uiController.setPlayButtonState(true);
    if (stylusArm && !stylusArm.classList.contains('playing')) {
      stylusArm.classList.add('playing');
    }
    if (!vuAnalyser) initVUVisualizer();
    startVU();
    // Toggle play/pause SVG icons
    const playIcon = ui.playPauseBtn.querySelector('.icon-play');
    const pauseIcon = ui.playPauseBtn.querySelector('.icon-pause');
    if (playIcon) playIcon.style.display = 'none';
    if (pauseIcon) pauseIcon.style.display = 'block';
  });

  playerEngine.on('pause', () => {
    animController.setVinylSpinning(false);
    uiController.setPlayButtonState(false);
    stopVU();
    // Toggle play/pause SVG icons
    const playIcon = ui.playPauseBtn.querySelector('.icon-play');
    const pauseIcon = ui.playPauseBtn.querySelector('.icon-pause');
    if (playIcon) playIcon.style.display = 'block';
    if (pauseIcon) pauseIcon.style.display = 'none';
  });

  playerEngine.on('stop', () => {
    animController.setVinylSpinning(false);
    uiController.setPlayButtonState(false);
    uiController.updateProgress(0, 0);
    if (stylusArm) stylusArm.classList.remove('playing');
    stopVU();
    // Toggle play/pause SVG icons
    const playIcon = ui.playPauseBtn.querySelector('.icon-play');
    const pauseIcon = ui.playPauseBtn.querySelector('.icon-pause');
    if (playIcon) playIcon.style.display = 'block';
    if (pauseIcon) pauseIcon.style.display = 'none';
  });

  playerEngine.on('trackChange', (data) => {
    songListRenderer.setActiveTrack(data.index);
  });

  playerEngine.on('progress', (data) => {
    uiController.updateProgress(data.elapsed, data.duration);
  });

  playerEngine.on('bufferingStart', () => {
    uiController.showBuffering();
  });

  playerEngine.on('bufferingEnd', () => {
    uiController.hideBuffering();
  });

  playerEngine.on('error', () => {
    uiController.showError('Track unavailable, skipping...');
  });

  playerEngine.on('modeChange', (data) => {
    uiController.setLoopButtonState(data.mode);
  });

  playerEngine.on('shuffleChange', (data) => {
    uiController.setShuffleButtonState(data.enabled);
  });

  // Wire up transport controls
  ui.playPauseBtn.addEventListener('click', () => {
    const s = playerEngine.getState();
    if (s.status === 'playing') {
      playerEngine.pause();
    } else if (s.status === 'paused') {
      playerEngine.resume();
    } else {
      // Starting from stopped state — swing arm first, then play
      const idx = s.selectedTrackIndex >= 0 ? s.selectedTrackIndex : 0;
      if (stylusArm && !stylusArm.classList.contains('playing')) {
        stylusArm.classList.add('playing');
        // Wait for arm animation to complete (0.8s transition) before starting audio
        setTimeout(() => {
          playerEngine.play(idx);
        }, 800);
      } else {
        playerEngine.play(idx);
      }
    }
  });

  ui.skipForwardBtn.addEventListener('click', () => playerEngine.skipForward());
  ui.skipBackBtn.addEventListener('click', () => playerEngine.skipBack());

  // Loop button cycles: play-through → loop-all → loop-one → play-through
  const modes = ['play-through', 'loop-all', 'loop-one'];
  ui.loopBtn.addEventListener('click', () => {
    const current = playerEngine.getState().mode;
    const idx = modes.indexOf(current);
    const next = modes[(idx + 1) % modes.length];
    playerEngine.setMode(next);
  });

  // Shuffle toggle
  ui.shuffleBtn.addEventListener('click', () => {
    const s = playerEngine.getState();
    playerEngine.setShuffle(!s.shuffleEnabled);
  });

  // Volume slider
  ui.volumeSlider.addEventListener('input', (e) => {
    playerEngine.setVolume(parseInt(e.target.value) / 100);
  });

  // Mute button
  ui.muteBtn.addEventListener('click', () => {
    const s = playerEngine.getState();
    playerEngine.setMute(!s.muted);
    const volIcon = ui.muteBtn.querySelector('.icon-vol');
    const mutedIcon = ui.muteBtn.querySelector('.icon-muted');
    if (!s.muted) {
      // Now muting
      if (volIcon) volIcon.style.display = 'none';
      if (mutedIcon) mutedIcon.style.display = 'block';
      ui.muteBtn.classList.add('muted');
    } else {
      // Now unmuting
      if (volIcon) volIcon.style.display = 'block';
      if (mutedIcon) mutedIcon.style.display = 'none';
      ui.muteBtn.classList.remove('muted');
    }
  });

  // Progress bar scrub
  let isScrubbing = false;
  const progressBar = ui.progressBar;

  function handleScrub(e) {
    const rect = progressBar.getBoundingClientRect();
    const x = (e.clientX || e.touches[0].clientX) - rect.left;
    const fraction = Math.max(0, Math.min(1, x / rect.width));
    playerEngine.seekTo(fraction);
  }

  progressBar.addEventListener('pointerdown', (e) => {
    isScrubbing = true;
    handleScrub(e);
    progressBar.setPointerCapture(e.pointerId);
  });

  progressBar.addEventListener('pointermove', (e) => {
    if (isScrubbing) handleScrub(e);
  });

  progressBar.addEventListener('pointerup', () => {
    isScrubbing = false;
  });

  // Set up keyboard navigation
  setupKeyboardNavigation(ui, playerEngine, songListRenderer, tracks);

  // Hide loading
  hidLoading(ui);
}

function getUIElements() {
  return {
    songListContainer: document.getElementById('song-list'),
    progressBar: document.getElementById('progress-bar'),
    progressFill: document.getElementById('progress-fill'),
    elapsedTime: document.getElementById('elapsed-time'),
    totalTime: document.getElementById('total-time'),
    nowPlayingTitle: null,
    vinylRecord: document.getElementById('vinyl'),
    playPauseBtn: document.getElementById('btn-play'),

function showFatalError(ui, message) {
  hidLoading(ui);
  if (ui.songListContainer) {
    ui.songListContainer.innerHTML = '';
    const msg = document.createElement('div');
    msg.classList.add('empty-library');
    msg.textContent = message;
    msg.setAttribute('role', 'alert');
    ui.songListContainer.appendChild(msg);
  }
}

function showEmptyLibrary(ui) {
  if (ui.songListContainer) {
    ui.songListContainer.innerHTML = '';
    const msg = document.createElement('div');
    msg.classList.add('empty-library');
    msg.textContent = 'Empty Library — no tracks available';
    msg.setAttribute('role', 'status');
    ui.songListContainer.appendChild(msg);
  }
}

function hidLoading(ui) {
  if (ui.loadingOverlay) {
    ui.loadingOverlay.classList.remove('visible');
    ui.loadingOverlay.setAttribute('aria-hidden', 'true');
  }
}

function generateBubbles() {
  const colors = ['#ff8c00', '#ffaa00', '#ff1493', '#00bfff', '#39ff14', '#9b59b6'];
  const container = document.getElementById('bubble-container');
  if (!container) return;

  // Left side bubbles — travel full path from bottom to badge
  for (let i = 0; i < 18; i++) {
    const bubble = document.createElement('div');
    bubble.classList.add('bubble', 'bubble-path-left');
    const size = 3 + Math.random() * 5;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const duration = 25 + Math.random() * 15;
    const delay = Math.random() * duration;

    bubble.style.width = `${size}px`;
    bubble.style.height = `${size}px`;
    bubble.style.background = color;
    bubble.style.boxShadow = `0 0 ${size}px ${color}66`;
    bubble.style.animationDuration = `${duration}s`;
    bubble.style.animationDelay = `-${delay}s`;

    container.appendChild(bubble);
  }

  // Right side bubbles
  for (let i = 0; i < 18; i++) {
    const bubble = document.createElement('div');
    bubble.classList.add('bubble', 'bubble-path-right');
    const size = 3 + Math.random() * 5;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const duration = 25 + Math.random() * 15;
    const delay = Math.random() * duration;

    bubble.style.width = `${size}px`;
    bubble.style.height = `${size}px`;
    bubble.style.background = color;
    bubble.style.boxShadow = `0 0 ${size}px ${color}66`;
    bubble.style.animationDuration = `${duration}s`;
    bubble.style.animationDelay = `-${delay}s`;

    container.appendChild(bubble);
  }
}

// Boot on DOMContentLoaded
document.addEventListener('DOMContentLoaded', initApp);

    })();
    </script>
